# Damage Control rules for Pi.
# Project-specific overrides can be placed at .pi/damage-control-rules.yaml.
# Entries support: pattern/path/command, reason, and optional ask: true.

strictMode: false

# Ask before running bash commands that reference paths outside the current working directory.
# When allowed, that path is trusted for the rest of the session.
askBeforeOutsideCwd: true

# Paths outside the current working directory that have been permanently allowed from the prompt UI.
# Use a trailing slash for directories.
allowedOutsideCwdPaths:
  - "~/.dotfiles/"
  - "~/.agent-browser/tmp/"
  - "~/projects/"

bashToolPatterns:
  - pattern: '\brm\s+(-[^\s]*)*-[rRf]'
    reason: rm with recursive or force flags
  - pattern: '\brm\s+--recursive\b'
    reason: rm with recursive flag
  - pattern: '\brm\s+--force\b'
    reason: rm with force flag
  - pattern: '\bsudo\s+rm\b'
    reason: sudo rm
  - pattern: '\bchmod\s+(-[^\s]+\s+)*777\b'
    reason: chmod 777 creates world-writable permissions
  - pattern: '\bchmod\s+-[Rr].*777\b'
    reason: recursive chmod 777
  - pattern: '\bchown\s+-[Rr].*\broot\b'
    reason: recursive chown to root
  - pattern: '\bgit\s+reset\s+--hard\b'
    reason: git reset --hard discards work
  - pattern: '\bgit\s+clean\s+(-[^\s]*)*-[fd]'
    reason: git clean with force or directory flags deletes untracked files
  - pattern: '\bgit\s+push\s+.*--force(?!-with-lease)'
    reason: git push --force; use --force-with-lease if intentional
  - pattern: '\bgit\s+push\s+(-[^\s]*)*-f\b'
    reason: git push -f; use --force-with-lease if intentional
  - pattern: '\bgit\s+stash\s+clear\b'
    reason: git stash clear deletes all stashes
  - pattern: '\bgit\s+reflog\s+expire\b'
    reason: git reflog expire can destroy recovery points
  - pattern: '\bgit\s+gc\s+.*--prune=now\b'
    reason: git gc --prune=now can lose dangling commits
  - pattern: '\bgit\s+filter-branch\b'
    reason: git filter-branch rewrites history
  - pattern: '\bgit\s+checkout\s+--\s*\.\b'
    reason: git checkout -- . discards all uncommitted changes
    ask: true
  - pattern: '\bgit\s+restore\s+\.\b'
    reason: git restore . discards all uncommitted changes
    ask: true
  - pattern: '\bgit\s+stash\s+drop\b'
    reason: git stash drop permanently deletes a stash
    ask: true
  - pattern: '\bgit\s+branch\s+(-[^\s]*)*-D\b'
    reason: force-deleting a branch can lose unmerged work
    ask: true
  - pattern: '\bmkfs\.'
    reason: filesystem format command
  - pattern: '\bdd\s+.*of=/dev/'
    reason: dd writing directly to a device
  - pattern: '\bkill\s+-9\s+-1\b'
    reason: kill all processes
  - pattern: '\bkillall\s+-9\b'
    reason: killall -9
  - pattern: '\bpkill\s+-9\b'
    reason: pkill -9
  - pattern: '\bhistory\s+-c\b'
    reason: clearing shell history
  - pattern: '\bterraform\s+apply\b'
    reason: terraform apply can change infrastructure
    ask: true
  - pattern: '\btofu\s+apply\b'
    reason: tofu apply can change infrastructure
    ask: true
  - pattern: '\bkubectl\s+delete\b'
    reason: kubectl delete removes Kubernetes resources
    ask: true
  - pattern: '\bkubectl\s+drain\b'
    reason: kubectl drain evicts workloads from a node
    ask: true
  - pattern: '\bkubectl\s+replace\s+.*--force\b'
    reason: kubectl replace --force deletes and recreates resources
    ask: true
  - pattern: '\bkubectl\s+scale\s+.*--replicas=0\b'
    reason: kubectl scale --replicas=0 stops workloads
    ask: true
  - pattern: '\baws\s+s3\s+rm\s+.*--recursive\b'
    reason: aws s3 rm --recursive deletes many objects
  - pattern: '\baws\s+s3\s+rb\s+.*--force\b'
    reason: aws s3 rb --force removes a bucket
  - pattern: '\baws\s+ec2\s+terminate-instances\b'
    reason: terminates EC2 instances
  - pattern: '\baws\s+rds\s+delete-db-instance\b'
    reason: deletes an RDS database
  - pattern: '\baws\s+cloudformation\s+delete-stack\b'
    reason: deletes CloudFormation infrastructure
  - pattern: '\bgcloud\s+projects\s+delete\b'
    reason: deletes a GCP project
  - pattern: '\bgcloud\s+compute\s+instances\s+delete\b'
    reason: deletes GCP compute instances
  - pattern: '\bgcloud\s+sql\s+instances\s+delete\b'
    reason: deletes GCP SQL instances
  - pattern: '\bgcloud\s+container\s+clusters\s+delete\b'
    reason: deletes a GKE cluster
  - pattern: '\bfirebase\s+projects:delete\b'
    reason: deletes a Firebase project
  - pattern: '\bwrangler\s+(delete|r2\s+bucket\s+delete|kv:namespace\s+delete|d1\s+delete)\b'
    reason: deletes Cloudflare resources
  - pattern: '\bTRUNCATE\s+TABLE\b'
    reason: SQL TRUNCATE deletes all rows
  - pattern: '\bDROP\s+(TABLE|DATABASE|SCHEMA)\b'
    reason: SQL DROP removes database objects
  - pattern: 'DELETE\s+FROM\s+\w+\s*;'
    reason: SQL DELETE without WHERE deletes all rows

zeroAccessPaths:
  - path: ".env"
    reason: environment secrets are zero-access
  - path: ".env.*"
    reason: environment secrets are zero-access
  - path: "*.env"
    reason: environment secrets are zero-access
  - path: "~/.ssh/"
    reason: SSH keys and config are zero-access
  - path: "~/.gnupg/"
    reason: GPG keys are zero-access
  - path: "~/.aws/"
    reason: AWS credentials are zero-access
  - path: "~/.config/gcloud/"
    reason: GCloud credentials are zero-access
  - path: "~/.azure/"
    reason: Azure credentials are zero-access
  - path: "~/.kube/"
    reason: Kubernetes credentials are zero-access
  - path: "~/.docker/"
    reason: Docker credentials are zero-access
  - path: "~/.netrc"
    reason: netrc credentials are zero-access
  - path: "~/.npmrc"
    reason: npm credentials are zero-access
  - path: "~/.pypirc"
    reason: PyPI credentials are zero-access
  - path: "~/.git-credentials"
    reason: Git credentials are zero-access
  - path: "*-credentials.json"
    reason: credential JSON files are zero-access
  - path: "*serviceAccount*.json"
    reason: service account keys are zero-access
  - path: "*service-account*.json"
    reason: service account keys are zero-access
  - path: "*.pem"
    reason: private keys/certificates are zero-access
  - path: "*.key"
    reason: private keys are zero-access
  - path: "*.p12"
    reason: certificate bundles are zero-access
  - path: "*.pfx"
    reason: certificate bundles are zero-access
  - path: "*.tfstate"
    reason: Terraform state may contain secrets
  - path: "*.tfstate.backup"
    reason: Terraform state backups may contain secrets
  - path: ".terraform/"
    reason: Terraform working files may contain secrets
  - path: ".supabase/"
    reason: Supabase project credentials are zero-access
  - path: "dump.sql"
    reason: database dumps are zero-access
  - path: "backup.sql"
    reason: database backups are zero-access
  - path: "*.dump"
    reason: database dumps are zero-access

readOnlyPaths:
  - path: "/etc/"
    reason: system configuration is read-only
  - path: "/usr/"
    reason: system directory is read-only
  - path: "/bin/"
    reason: system directory is read-only
  - path: "/sbin/"
    reason: system directory is read-only
  - path: "/boot/"
    reason: boot files are read-only
  - path: "/root/"
    reason: root home is read-only
  - path: "~/.bash_history"
    reason: shell history is read-only
  - path: "~/.zsh_history"
    reason: shell history is read-only
  - path: "~/.bashrc"
    reason: shell profile is read-only unless explicitly requested
    ask: true
  - path: "~/.zshrc"
    reason: shell profile is read-only unless explicitly requested
    ask: true
  - path: "~/.profile"
    reason: shell profile is read-only unless explicitly requested
    ask: true
  - path: "package-lock.json"
    reason: lockfiles are read-only unless explicitly requested
    ask: true
  - path: "yarn.lock"
    reason: lockfiles are read-only unless explicitly requested
    ask: true
  - path: "pnpm-lock.yaml"
    reason: lockfiles are read-only unless explicitly requested
    ask: true
  - path: "bun.lockb"
    reason: lockfiles are read-only unless explicitly requested
    ask: true
  - path: "*.lock"
    reason: lockfiles are read-only unless explicitly requested
    ask: true
  - path: "*.min.js"
    reason: minified/generated files are read-only
  - path: "*.min.css"
    reason: minified/generated files are read-only
  - path: "dist/"
    reason: build output is read-only
  - path: "build/"
    reason: build output is read-only
  - path: ".next/"
    reason: build output is read-only
  - path: ".nuxt/"
    reason: build output is read-only
  - path: "__pycache__/"
    reason: generated cache files are read-only
  - path: ".venv/"
    reason: virtual environments are read-only
  - path: "venv/"
    reason: virtual environments are read-only
  - path: "target/"
    reason: build output is read-only

noDeletePaths:
  - path: "~/.pi/"
    reason: Pi configuration and sessions must not be deleted
  - path: ".pi/"
    reason: project Pi configuration must not be deleted
  - path: ".git/"
    reason: Git repository metadata must not be deleted
  - path: ".gitignore"
    reason: Git ignore file must not be deleted
  - path: ".gitattributes"
    reason: Git attributes file must not be deleted
  - path: ".gitmodules"
    reason: Git submodule metadata must not be deleted
  - path: "README.md"
    reason: README must not be deleted
  - path: "README.*"
    reason: README must not be deleted
  - path: "LICENSE"
    reason: license file must not be deleted
  - path: "LICENSE.*"
    reason: license file must not be deleted
  - path: "COPYING"
    reason: license file must not be deleted
  - path: "NOTICE"
    reason: notice file must not be deleted
  - path: "SECURITY.md"
    reason: security policy must not be deleted
  - path: "AGENTS.md"
    reason: agent instructions must not be deleted
  - path: "CLAUDE.md"
    reason: agent instructions must not be deleted
  - path: ".github/"
    reason: CI/project metadata must not be deleted
  - path: "Dockerfile"
    reason: Dockerfile must not be deleted
  - path: "Dockerfile.*"
    reason: Dockerfile must not be deleted
  - path: "docker-compose.yml"
    reason: Docker compose config must not be deleted
  - path: "docker-compose.*.yml"
    reason: Docker compose config must not be deleted

# If strictMode is true, every bash command must match at least one regex here.
strictModeAllowedList:
  - command: '^\s*(pwd|ls|find|rg|grep|git\s+status|git\s+diff|git\s+log|git\s+show|git\s+branch)(\s|$)'
    reason: common read-only inspection commands
  - command: '^\s*(node|python3?|bun|npm|pnpm|yarn)\s+(-v|--version|test\b|run\s+(test|lint|typecheck)\b)'
    reason: safe version and test commands
